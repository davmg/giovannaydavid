<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giovanna y David</title>
    <link rel="stylesheet" href="styles/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Franklin:ital,wght@0,100..900;1,100..900&family=Playfair:ital,opsz,wght@0,5..1200,300..900;1,5..1200,300..900&display=swap" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="/imgs/favicon.png">

    <!-- Other meta tags like title, description, etc. -->

    <meta property="og:title" content="Giovanna y David" />
    <meta property="og:type" content="website" /> <!-- or 'article', 'blog', 'video.movie', etc. -->
    <meta property="og:image" content="https://davmg.github.io/giovannaydavid/imgs/ogimage.png" />

    <!-- Optional but recommended tags -->
    <meta property="og:description" content="¡Nos vamos a casar!" />
    <meta property="og:image:width" content="700" />
    <meta property="og:image:height" content="520" />
</head>
<body>
    <div id="envelope-page">
        <div id="envelope-title" class="display-vertical" style="align-items: center;text-align: center;">
            <h2 id="guest-names" class="highlight-text">Lina y Víctor,</h2>
            <h1 id="main-title" class="subtitle-text">¡Nos vamos a casar!</h1>
        </div>
        <div id="envelope">
            <img id="envelope-inside" src="imgs/envelope/inside.png" >
            <img id="envelope-card" src="imgs/envelope/card.png">
            <img id="envelope-bottom" src="imgs/envelope/bottom.png" alt="">
            <img id="envelope-flap" src="imgs/envelope/flap.png" alt="">
            <img id="envelope-seal" src="imgs/envelope/seal.png" alt="">
            <p id="text-open" class="body-text">Abrir invitación</p>
        </div>
        <img src="imgs/monograma-verde.png" class="img-100">
    </div>
    <div id="error-message">
        <p class="body-text" style="color: var(--text-dark);">Hubo un error con tu invitación. Por favor revisa el enlace que te enviamos.</p>
        <img id="error-image" src="imgs/envelope/envelope-error.png" alt="">
        <img src="imgs/monograma-verde.png" class="img-100">
    </div>

    <script>
        // Envelope opening animation
        const envelopeEl = document.getElementById('envelope');
        const flapEl = document.getElementById('envelope-flap');
        const cardEl = document.getElementById('envelope-card');
        
        if (envelopeEl && flapEl) {
            envelopeEl.addEventListener('click', () => {
                flapEl.classList.add('opening');
                cardEl.classList.add('opening');
                envelopeEl.classList.add('opening');
                
                // Redirect to invitacion.html after 3 seconds (1s animation + 2s delay)
                const params = new URLSearchParams(window.location.search);
                const guestId = params.get("id");
                
                setTimeout(() => {
                    // Start fade-out animation (1s duration)
                    document.body.classList.add('fade-out');
                    
                    // Redirect after fade-out completes
                    setTimeout(() => {
                        const redirectUrl = guestId ? `invitacion.html?id=${guestId}` : 'invitacion.html';
                        window.location.href = redirectUrl;
                    }, 1000);
                }, 2000);
            });
        }

        //Read CSV guests
        document.addEventListener("DOMContentLoaded", function () {

                const params = new URLSearchParams(window.location.search);
                const guestId = params.get("id");

                const nameEl = document.getElementById("guest-names");

                // Robust CSV parser (handles quoted commas)
                function parseCSV(text) {
                    const rows = [];
                    const lines = text.trim().split("\n");

                    for (let i = 1; i < lines.length; i++) { // skip header
                        const row = [];
                        let current = "";
                        let insideQuotes = false;

                        for (let char of lines[i]) {
                            if (char === '"') {
                                insideQuotes = !insideQuotes;
                            } else if (char === "," && !insideQuotes) {
                                row.push(current.trim());
                                current = "";
                            } else {
                                current += char;
                            }
                        }

                        row.push(current.trim());

                        // Remove surrounding quotes if present
                        rows.push(
                            row.map(field =>
                                field.replace(/^"|"$/g, "").replace(/""/g, '"')
                            )
                        );
                    }

                    return rows;
                }

                async function loadGuests() {
                    try {
                        const response = await fetch("docs/guests.csv");
                        const csvText = await response.text();

                        const parsedRows = parseCSV(csvText);

                        const guests = parsedRows.map(row => ({
                            id: row[0],
                            name: row[1],
                            seats: row[2]
                        }));

                        return guests;

                    } catch (error) {
                        console.error("Error loading CSV:", error);
                        return [];
                    }
                }

                async function init() {

                    if (!guestId) {
                        document.getElementById("envelope-page").style.display = "none";
                        document.getElementById("error-message").style.display = "flex";
                        return;
                    }

                    const guests = await loadGuests();
                    const guest = guests.find(g => g.id === guestId);

                    if (!guest) {
                        document.getElementById("envelope-page").style.display = "none";
                        document.getElementById("error-message").style.display = "flex";
                        return;
                    }
                    console.log(guest);
                    nameEl.innerHTML = guest.name + ',';
                }

                init();
        });
    </script>
</body>
